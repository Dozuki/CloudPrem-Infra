on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

name: Create Release

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ⚠️ Breaking changes / migration notes

            - EKS Auto Mode migration (#129). Replaces the ASG worker-group pattern with Karpenter-managed node pools, switches all workload IAM from IRSA to Pod Identity, and removes four bundled charts
            (cluster-autoscaler, aws-ebs-csi-driver, aws-for-fluent-bit, adot-exporter) — these are all native to Auto Mode now. scaling.tf and termination.tf removed. CloudWatch Observability addon replaces ADOT +
            FluentBit. NLB upgraded to IP targeting (needed for Envoy Gateway).
            - image_tag / nextjs_tag are now required variables (#129) — no defaults; must be set per environment.
            - Helm values architecture rewrite (#128). The 1076-line static/app-values.yaml template is deleted. The chart's own values.yaml is now the single source of truth; Terraform overrides ~35 env-specific values
            via jsonencode() and uses set_sensitive for ~19 secrets (which are now redacted in plan output). Any custom overrides previously made in app-values.yaml need to migrate to either the chart or jsonencode.
            - Kubernetes resources upgraded to _v1 variants (#129).
            - MSK Kafka 2.7.0 → 3.7.x (#123). AWS no longer accepts 2.7.0 for new clusters. Existing clusters on 2.7.0 need a separate in-place version upgrade applied; this PR only changes the version used at creation.
          
            ✨ Features
          
            - Vault + ESO integration (#129, #130) — central Vault cluster integration via PrivateLink, AWS IAM auth from Terraform for secret seeding, K8s auth for ESO. Cross-region PrivateLink supported via
            aws_vpc_endpoint.service_region (#130).
            - Spacelift compatibility (#130) — spacelift variable for conditional IAM auth; uses VAULT_ADDR env var; conditional AZ filtering for same-region vs cross-region PrivateLink.
            - Gateway API support in cert-manager (#124) — config.enableGatewayAPI enabled so Gateway listener annotations actually trigger cert issuance.
            - Wildcard ingress hostname (#122) — new ingress_hostname variable, defaults to dns_domain_name. When set to a wildcard (e.g., *.customer.com), cert-manager annotations are suppressed to allow customer-provided
              wildcard certs (airgapped envs).
            - eks_k8s_version override (#130) — Auto Mode normally manages K8s upgrades automatically; this var pins a version when needed.
            - Pod Identity for dozuki-migration-wait SA (#130) — needed for EKS 1.35+.
          
            🐛 Fixes                                                                                                                                                                                                          ─
          
            - Vault provider auth workaround (#130) — uses generic auth_login with method=aws to sidestep vault-provider v4.x bug #1655 with auth_login_aws.
            - Modernized deprecated AWS provider attributes (#129).
            - NextJS repository path (#121) — corrected an incorrect reference.
          
            🔧 Dependency upgrades                                                                                                                                                                                            ─
          
            - terraform-aws-modules/eks ~17 → ~21
            - All other terraform-aws-modules/* modules to latest majors (#129)
            - cert-manager v1.19.3 → v1.19.4 (#124)
            - MSK Kafka 2.7.0 → 3.7.x (#123)
          draft: false
          prerelease: false
