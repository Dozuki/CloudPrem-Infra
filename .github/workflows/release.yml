on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

name: Create Release

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ⚠️ Breaking changes / migration notes

            - Helm chart now consumed from ECR as an OCI artifact (#145). The dozuki chart is no longer a git submodule under terraform/logical/charts/dozuki. The logical layer pulls it from oci://<image_repository>/charts/dozuki at the chart_version variable (default 0.3.0) via an ECR registry login. The pinned chart version must be published to your ECR before applying — existing environments on the default need no tfvars change, but the chart must exist in the registry. .gitmodules and the submodule directory are removed.
            - Physical layer now requires OpenTofu 1.12.x (#149). Adding the Aurora path pulls the terraform-aws-modules/rds-aurora module, whose required_version (>= 1.11.1) is evaluated at init even when db_engine = "rds" (the default) — so the physical layer can no longer run on Terraform 1.5.7. ALL physical stacks (RDS and Aurora alike) must run OpenTofu 1.12.x; switch Spacelift physical stacks to the OpenTofu workflow tool before applying v6.1. The logical layer is unchanged (Terraform 1.5.7).

            ✨ Features

            - DR Phase 1: cross-region backup/restore data layer (#138) — new enable_dr / dr_region variables (on by default — ephemeral/dev stacks may set false — with a region guardrail). When enabled: DR-region KMS keys for replicated RDS backups and S3 content, cross-region replication of primary RDS automated backups, versioned KMS-encrypted DR destination S3 buckets with a replication role and V2 replication config, and SNS alarms on S3 replication latency/failures. Exposes DR bucket names, KMS key, and backup-replication ARN as outputs.
            - EKS control-plane audit logging (#132) — new eks_enabled_log_types variable defaulting to all 5 control-plane log types (api, audit, authenticator, controllerManager, scheduler), streamed to CloudWatch Logs at 90-day retention. Required by Vanta / SOC2 and matches the vault-cluster posture. Set to [] in env.hcl to disable (not recommended).
            - Aurora Serverless v2 is now the default for new stacks (#149) — db_engine ("rds" | "aurora", default "aurora") selects Aurora MySQL 8.4 Serverless v2 (terraform-aws-modules/rds-aurora v10, serverlessv2 ACU min/max vars, write-only master password). The physical→logical contract (primary_db_secret) is unchanged, so logical/app/chart need no changes. aurora_engine_version uses the full RDS format (8.4.mysql_aurora.8.4.7). Switching an existing stack's db_engine REPLACES the database — a Spacelift PLAN policy (db-replace-guard, in infra-live) fails any plan that deletes/replaces an aws_db_instance/aws_rds_cluster unless the stack carries the allow-db-replace label, so existing rds stacks must pin db_engine="rds" (the guard protects the fleet either way). Requires the OpenTofu 1.12.x toolchain (see migration notes).
            - Azure support — multi-cloud foundation (#140, #152) — new terraform/physical-azure layer (VNet, AKS, MySQL Flexible Server, Key Vault, managed identity) behind a documented physical→logical contract (terraform/CONTRACT.md) that makes the logical layer cloud-agnostic. The logical layer is parameterized for Azure (Key Vault secrets, SeaweedFS object storage) with the AWS path unchanged. Adds the azure-config deploy kit (bootstrap, ECR→registry image mirror, release bundle) for turnkey Azure Gov deploys. AWS deployments are unaffected.
            - Gateway rate limiting + Envoy Gateway 1.8.1 (#184) — opt-in global rate limiting backed by Redis (new terraform/logical/ratelimit.tf), Envoy Gateway upgraded to 1.8.1, PROXY protocol v2 on the NLB→Envoy path so the app sees real client IPs, and a Redis lockdown (auth + restricted access).
            - Customer-provided TLS via Vault (#194) — new customer_tls_externally_managed variable adds a third gateway-TLS path alongside supplied-cert and self-signed: an ExternalSecret syncs the cert+key from Vault (secret/<tenant>/<env>/tls) into tls-secret, with the chart's tls.externallyManaged set so it skips rendering the secret and drops the cert-manager annotation. The cert never enters Terraform state.

            🐛 Fixes

            - CloudWatch alarms stuck in INSUFFICIENT_DATA (#137) — two independent bugs left every alarm unable to pull metrics. RDS alarm dimensions now use local.identifier instead of the rds module's db_instance_id, which under AWS provider v5+ returns the resource ID (db-XXXX) rather than the DBInstanceIdentifier. The amazon-cloudwatch-observability addon is now managed in Terraform with a Pod Identity association binding the cloudwatch-agent SA to CloudWatchAgentServerPolicy (+ AWSXRayDaemonWriteAccess), fixing the empty ContainerInsights namespace on Auto Mode.
            - AWS_REGION on S3 replication job init (#133) — the s3_replication_job_init local-exec now sets AWS_REGION so the internal aws CLI calls succeed on Spacelift workers, which provide credentials but no default region.
            - NLB deletion protection blocked teardown (#151) — terraform-aws-modules/alb ~> 10.0 defaults enable_deletion_protection to true, so NLBs could not be destroyed and their lingering ENIs pinned the Internet Gateway during destroy. nlb.tf now sets it from var.protect_resources, matching RDS/Aurora/BI.
            - Missing aws.dr provider in the live root (#151) — physical/dr.tf references provider = aws.dr unconditionally, but live/terragrunt.hcl stopped generating it, so destroy/plan failed with "provider configuration not present." The root now generates the aws.dr provider (+ dr_region local), matching infra-live.
            - Deprecated data.aws_region.current.id (#192) — switched to .region (the .id attribute is deprecated under AWS provider v6) across the physical and logical layers.
            - azurerm provider no longer needs the Azure CLI on AWS deploys — the azurerm provider is configured via provider for_each gated on var.cloud, so it has zero instances on AWS Spacelift workers (which have no az CLI) instead of failing at plan.
            - amazon-cloudwatch-observability addon moved to the logical layer — on EKS Auto Mode a fresh cluster has no nodes until workloads schedule, so installing the node-dependent addon in the physical layer timed out DEGRADED on first deploy; it now installs in logical after cert-manager triggers nodes.
            - Deterministic lambda packaging + DMS-start wait (#193, forward-port) — the SNS/DMS-restart lambda archives pin output_path to ${path.module} (fixing phantom source_code_hash diffs), and the DMS start-replication kubectl wait now targets deploy/dozuki-app-deployment (the chart's actual deploy name).
          draft: false
          prerelease: false
