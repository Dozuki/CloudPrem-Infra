# MPC Azure image manifest — synced into the customer ACR by sync-images.sh.
# Format: <source-image-ref> <target-repository>:<tag>
# Source refs are GHCR (populated at release time by Dozuki CI). Lines starting
# with # are ignored.
#
# ghcr.io/dozuki/app:RELEASE_TAG          app:RELEASE_TAG
# ghcr.io/dozuki/web-nextjs:RELEASE_TAG   web-nextjs:RELEASE_TAG
#
# Helm charts are OCI artifacts and sync the same way:
# ghcr.io/dozuki/charts/dozuki:CHART_VERSION   charts/dozuki:CHART_VERSION
